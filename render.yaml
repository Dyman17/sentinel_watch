services:
  - type: web
    name: sentinel-watch
    env: python
    buildCommand: |
      pip install -r requirements.txt
      ls -la frontend/
      cd frontend && ls -la && npm install --verbose && npm run build --verbose
      mkdir -p ../static && cp -r dist/* ../static/
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: yes
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: ESP_STREAM_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
